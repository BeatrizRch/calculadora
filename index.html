<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculadora">
        <input type="text" class="tela" id="resultado" readonly value="0">

        <div class="botoes">
            <button class="btn limpar" onclick="limparTela()">C</button>
            <button class="btn operador" onclick="inserir('/')">&divide;</button>
            <button class="btn operador" onclick="inserir('*')">&times;</button>
            <button class="btn operador" onclick="apagarUltimo()">&#9003;</button>

            <button class="btn" onclick="inserir('7')">7</button>
            <button class="btn" onclick="inserir('8')">8</button>
            <button class="btn" onclick="inserir('9')">9</button>
            <button class="btn operador" onclick="inserir('-')">-</button>

            <button class="btn" onclick="inserir('4')">4</button>
            <button class="btn" onclick="inserir('5')">5</button>
            <button class="btn" onclick="inserir('6')">6</button>
            <button class="btn operador" onclick="inserir('+')">+</button>

            <button class="btn" onclick="inserir('1')">1</button>
            <button class="btn" onclick="inserir('2')">2</button>
            <button class="btn" onclick="inserir('3')">3</button>
            <button class="btn igual" onclick="calcular()">=</button>

            <button class="btn zero" onclick="inserir('0')">0</button>
            <button class="btn" onclick="inserir('.')">,</button>
        </div>
    </div>

    <script>
        const tela = document.getElementById('resultado');

        function inserir(valor) {
            if (tela.value === '0' && valor !== '.') {
                tela.value = valor;
            } else {
                tela.value += valor;
            }
        }

        function limparTela() {
            tela.value = '0';
        }

            if (tela.value.length > 1) {
                tela.value = tela.value.slice(0, -1);
            } else {
                tela.value = '0';
            }
        }
